<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>spltiers — Backoffice Editor Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  .nav { background: #0d1117; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; flex-shrink: 0; }
  .nav-logo { display: flex; align-items: center; gap: 3px; }
  .nav-logo-main { font-size: 20px; font-weight: 500; color: #e63946; letter-spacing: -0.5px; font-style: italic; }
  .nav-logo-dot { width: 5px; height: 5px; border-radius: 50%; background: #ffd700; margin-bottom: 1px; }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .hive-badge { display: flex; align-items: center; gap: 6px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 4px 10px; }
  .hive-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; }
  .hive-badge span { font-size: 12px; color: #8b949e; }
  .save-btn { background: #238636; border: 1px solid #2ea043; border-radius: 6px; padding: 5px 14px; font-size: 12px; font-weight: 500; color: #f0f6fc; cursor: pointer; }
  .save-btn:hover { background: #2ea043; }
  .save-btn:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: default; }

  .toolbar { background: #0d1117; border-bottom: 1px solid #21262d; padding: 10px 24px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .toolbar-title { font-size: 14px; font-weight: 500; color: #f0f6fc; margin-right: 6px; }
  .search { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #f0f6fc; width: 150px; }
  .search::placeholder { color: #484f58; }
  .filter-select { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 5px 8px; font-size: 12px; color: #8b949e; }
  .unsaved-banner { margin-left: auto; background: #3d2c00; border: 1px solid #6e4c00; border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #f0c000; display: none; }
  .unsaved-banner.show { display: block; }

  .editor { display: flex; flex: 1; overflow: hidden; }

  .unranked-panel { width: 220px; min-width: 220px; background: #0d1117; border-right: 1px solid #21262d; display: flex; flex-direction: column; }
  .panel-header { padding: 10px 12px 8px; border-bottom: 1px solid #21262d; flex-shrink: 0; }
  .panel-header h3 { font-size: 11px; font-weight: 500; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-header p { font-size: 11px; color: #484f58; margin-top: 2px; }
  .unranked-grid { padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; overflow-y: auto; flex: 1; align-content: flex-start; }

  .tiers-panel { flex: 1; overflow-y: auto; }

  .tier-lane { display: flex; border-bottom: 1px solid #21262d; min-height: 86px; }
  .tier-lane-label { width: 48px; min-width: 48px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; flex-shrink: 0; }
  .tier-lane-label.s { background: #3d3000; color: #ffd700; }
  .tier-lane-label.a { background: #0d3320; color: #2ecc71; }
  .tier-lane-label.b { background: #0d2440; color: #3498db; }
  .tier-lane-label.c { background: #1c2128; color: #95a5a6; }
  .tier-lane-label.d { background: #161b22; color: #555e6a; }
  .tier-lane-drop { flex: 1; padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; transition: background 0.15s; min-height: 86px; }
  .tier-lane-drop.drag-over { background: #1c2840; }
  .tier-lane-drop.empty { position: relative; }
  .tier-lane-drop.empty::after { content: 'drag cards here'; font-size: 11px; color: #30363d; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); white-space: nowrap; pointer-events: none; }

  .card { width: 62px; height: 62px; border-radius: 6px; overflow: hidden; cursor: grab; border: 1px solid #30363d; transition: transform 0.12s, border-color 0.12s, opacity 0.12s; flex-shrink: 0; position: relative; background: #21262d; display: flex; align-items: center; justify-content: center; user-select: none; }
  .card:hover { transform: scale(1.06); border-color: #58a6ff; }
  .card.dragging { opacity: 0.35; cursor: grabbing; }
  .card.selected { border-color: #e63946; box-shadow: 0 0 0 1px #e63946; }
  .card span { font-size: 8px; color: #484f58; text-align: center; padding: 3px; line-height: 1.3; pointer-events: none; }

  .ann-panel { width: 200px; min-width: 200px; background: #0d1117; border-left: 1px solid #21262d; padding: 14px; display: none; flex-direction: column; overflow-y: auto; }
  .ann-panel.show { display: flex; }
  .ann-panel h3 { font-size: 11px; font-weight: 500; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .ann-card-name { font-size: 13px; font-weight: 500; color: #f0f6fc; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #21262d; }
  .ann-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
  .ann-input { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 6px 8px; font-size: 12px; color: #f0f6fc; width: 100%; margin-bottom: 10px; }
  .ann-input::placeholder { color: #484f58; }
  .ann-textarea { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 6px 8px; font-size: 12px; color: #f0f6fc; width: 100%; resize: vertical; min-height: 70px; margin-bottom: 10px; }
  .ann-textarea::placeholder { color: #484f58; }
  .ann-save { background: #21262d; border: 1px solid #30363d; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #f0f6fc; cursor: pointer; width: 100%; margin-bottom: 6px; }
  .ann-save:hover { background: #30363d; }
  .ann-close { font-size: 11px; color: #484f58; cursor: pointer; text-align: center; }
  .ann-close:hover { color: #8b949e; }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">
    <span class="nav-logo-main">spltiers</span>
    <div class="nav-logo-dot"></div>
    <span style="font-size:13px;color:#8b949e;margin-left:10px;">admin</span>
  </div>
  <div class="nav-right">
    <div class="hive-badge"><div class="hive-dot"></div><span>brave.sps</span></div>
    <button class="save-btn" id="save-btn" disabled onclick="saveAll()">save changes</button>
  </div>
</div>

<div class="toolbar">
  <span class="toolbar-title">Conclave Arcana</span>
  <input class="search" placeholder="search cards..." oninput="filterCards(this.value)" />
  <select class="filter-select">
    <option value="">all rarities</option>
    <option>common</option>
    <option>rare</option>
    <option>epic</option>
    <option>legendary</option>
  </select>
  <div class="unsaved-banner" id="unsaved-banner">unsaved changes</div>
</div>

<div class="editor">
  <div class="unranked-panel">
    <div class="panel-header">
      <h3>unranked</h3>
      <p id="unranked-count">12 cards remaining</p>
    </div>
    <div class="unranked-grid" id="unranked-pool"></div>
  </div>
  <div class="tiers-panel" id="tiers-panel"></div>
  <div class="ann-panel" id="ann-panel">
    <h3>annotate card</h3>
    <div class="ann-card-name" id="ann-name">—</div>
    <div class="ann-label">role (optional)</div>
    <input class="ann-input" id="ann-role" placeholder="e.g. Tank, Damage, Support" />
    <div class="ann-label">notes (optional)</div>
    <textarea class="ann-textarea" id="ann-notes" placeholder="Why is this card strong? Any tips for players..."></textarea>
    <button class="ann-save">save annotation</button>
    <div class="ann-close" onclick="closeAnn()">close</div>
  </div>
</div>

<script>
let unranked = ['Abyssal Imp','Tide Wraith','Storm Caller','Venom Imp','Crypt Shade','Dust Wisp','Bone Archer','Lava Drake','Marsh Stalker','Ember Toad','Root Walker','Gilded Harpy'];
const tiered = { S: ['Void Dragon','Thornwood Sentinel','Abyssal Elemental'], A: ['Plague Gorgon','Iron Juggernaut','Dusk Oracle','Tide Binder'], B: ['Stone Warden','Glacial Toad','Runic Archer'], C: ['Mud Golem','Bone Collector'], D: [] };
const tierMeta = {
  S: 's', A: 'a', B: 'b', C: 'c', D: 'd'
};

let dragCard = null, dragFrom = null, hasChanges = false, selectedCard = null;
let searchFilter = '';

function markChanged() {
  if (!hasChanges) {
    hasChanges = true;
    document.getElementById('save-btn').disabled = false;
    document.getElementById('unsaved-banner').className = 'unsaved-banner show';
  }
}

function makeCard(name, fromPool) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.name = name;
  const sp = document.createElement('span');
  sp.textContent = name;
  el.appendChild(sp);
  el.addEventListener('dragstart', () => {
    dragCard = name;
    dragFrom = fromPool ? 'unranked' : el.closest('.tier-lane-drop')?.dataset.tier;
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  if (!fromPool) {
    el.addEventListener('click', () => {
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      openAnn(name);
    });
  }
  return el;
}

function buildUnranked(filter = '') {
  const pool = document.getElementById('unranked-pool');
  pool.innerHTML = '';
  const filtered = unranked.filter(n => n.toLowerCase().includes(filter.toLowerCase()));
  filtered.forEach(name => pool.appendChild(makeCard(name, true)));
  document.getElementById('unranked-count').textContent = filtered.length + ' cards remaining';
  pool.addEventListener('dragover', e => e.preventDefault());
  pool.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragCard || dragFrom === 'unranked') return;
    if (dragFrom) { const i = tiered[dragFrom].indexOf(dragCard); if (i > -1) tiered[dragFrom].splice(i, 1); }
    if (!unranked.includes(dragCard)) unranked.push(dragCard);
    markChanged(); buildUnranked(searchFilter); buildTiers();
  });
}

function buildTiers() {
  const panel = document.getElementById('tiers-panel');
  panel.innerHTML = '';
  Object.entries(tiered).forEach(([tier, cards]) => {
    const lane = document.createElement('div');
    lane.className = 'tier-lane';
    const lbl = document.createElement('div');
    lbl.className = `tier-lane-label ${tierMeta[tier]}`;
    lbl.textContent = tier;
    const drop = document.createElement('div');
    drop.className = 'tier-lane-drop' + (cards.length === 0 ? ' empty' : '');
    drop.dataset.tier = tier;
    cards.forEach(name => drop.appendChild(makeCard(name, false)));
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag-over'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('drag-over'));
    drop.addEventListener('drop', e => {
      e.preventDefault();
      drop.classList.remove('drag-over');
      if (!dragCard) return;
      if (dragFrom === 'unranked') { const i = unranked.indexOf(dragCard); if (i > -1) unranked.splice(i, 1); }
      else if (dragFrom && dragFrom !== tier) { const i = tiered[dragFrom].indexOf(dragCard); if (i > -1) tiered[dragFrom].splice(i, 1); }
      if (!tiered[tier].includes(dragCard)) tiered[tier].push(dragCard);
      markChanged(); buildUnranked(searchFilter); buildTiers();
    });
    lane.appendChild(lbl);
    lane.appendChild(drop);
    panel.appendChild(lane);
  });
}

function filterCards(val) { searchFilter = val; buildUnranked(val); }

function openAnn(name) {
  document.getElementById('ann-name').textContent = name;
  document.getElementById('ann-role').value = '';
  document.getElementById('ann-notes').value = '';
  document.getElementById('ann-panel').className = 'ann-panel show';
}

function closeAnn() {
  document.getElementById('ann-panel').className = 'ann-panel';
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
}

function saveAll() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'saved ✓';
  btn.disabled = true;
  document.getElementById('unsaved-banner').className = 'unsaved-banner';
  hasChanges = false;
  setTimeout(() => { btn.textContent = 'save changes'; }, 2000);
}

buildUnranked();
buildTiers();
</script>
</body>
</html>
