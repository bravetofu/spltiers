  <rect x="2"    y="26" width="5" height="3" rx="1.5" fill="#ffd700"/>
  <rect x="8.5"  y="26" width="5" height="3" rx="1.5" fill="#2ecc71"/>
  <rect x="15"   y="26" width="5" height="3" rx="1.5" fill="#3498db"/>
  <rect x="21.5" y="26" width="4" height="3" rx="1.5" fill="#95a5a6"/>
